name: XAUUSD ONE JOB 2015-2022

on:
  workflow_dispatch:

jobs:
  download-all:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install requests
        run: pip install requests

      - name: Download XAUUSD 2015 to 2022 one by one
        run: |
          python - << 'PY'
          import os
          import csv
          import lzma
          import struct
          import zipfile
          import calendar
          import time
          from datetime import datetime, timedelta
          import requests

          SYMBOL = "XAUUSD"
          PRICE_DIVISOR = 1000.0
          START_YEAR = 2015
          END_YEAR = 2022

          OUT_DIR = "all_months"
          os.makedirs(OUT_DIR, exist_ok=True)

          def dukascopy_url(symbol, year, month, day, hour):
              return f"https://datafeed.dukascopy.com/datafeed/{symbol}/{year}/{month-1:02d}/{day:02d}/{hour:02d}h_ticks.bi5"

          def download_hour(symbol, year, month, day, hour, retries=5):
              url = dukascopy_url(symbol, year, month, day, hour)

              for attempt in range(retries):
                  try:
                      r = requests.get(url, timeout=60)

                      if r.status_code != 200 or len(r.content) == 0:
                          return []

                      raw = lzma.decompress(r.content)
                      ticks = []
                      base_time = datetime(year, month, day, hour)

                      for i in range(0, len(raw), 20):
                          chunk = raw[i:i+20]
                          if len(chunk) < 20:
                              continue

                          ms, ask_i, bid_i, ask_vol, bid_vol = struct.unpack(">IIIff", chunk)

                          t = base_time + timedelta(milliseconds=ms)
                          ask = ask_i / PRICE_DIVISOR
                          bid = bid_i / PRICE_DIVISOR

                          ticks.append([
                              t.strftime("%Y-%m-%d %H:%M:%S.%f")[:-3],
                              bid,
                              ask,
                              bid_vol,
                              ask_vol
                          ])

                      return ticks

                  except Exception as e:
                      print(f"Retry {attempt+1}/{retries} failed: {url} | {e}", flush=True)
                      time.sleep(5)

              return []

          total_zip_count = 0

          for YEAR in range(START_YEAR, END_YEAR + 1):
              print("\n" + "#" * 80)
              print(f"START YEAR: {YEAR}")
              print("#" * 80, flush=True)

              for MONTH in range(1, 13):
                  tag = f"{YEAR}_{MONTH:02d}"
                  csv_path = f"{SYMBOL}_TICK_{tag}_DUKASCOPY.csv"
                  zip_path = os.path.join(OUT_DIR, f"{SYMBOL}_TICK_{tag}_DUKASCOPY.zip")

                  days = calendar.monthrange(YEAR, MONTH)[1]
                  total_ticks = 0

                  print("\n" + "=" * 70)
                  print(f"START MONTH: {tag}")
                  print("=" * 70, flush=True)

                  with open(csv_path, "w", newline="") as f:
                      writer = csv.writer(f)
                      writer.writerow(["time", "bid", "ask", "bid_volume", "ask_volume"])

                      for day in range(1, days + 1):
                          day_ticks = 0

                          for hour in range(24):
                              ticks = download_hour(SYMBOL, YEAR, MONTH, day, hour)

                              if ticks:
                                  writer.writerows(ticks)
                                  day_ticks += len(ticks)
                                  total_ticks += len(ticks)

                          print(f"Day {day:02d}/{days} — ticks: {day_ticks:,}", flush=True)

                  with zipfile.ZipFile(zip_path, "w", zipfile.ZIP_DEFLATED) as z:
                      z.write(csv_path, arcname=os.path.basename(csv_path))

                  os.remove(csv_path)

                  total_zip_count += 1
                  size_mb = os.path.getsize(zip_path) / 1024 / 1024

                  print(f"MONTH COMPLETE: {tag} — total ticks: {total_ticks:,}", flush=True)
                  print(f"ZIP READY: {zip_path} — {size_mb:.2f} MB", flush=True)
                  print(f"TOTAL ZIP DONE: {total_zip_count}/96", flush=True)

          if total_zip_count != 96:
              raise Exception(f"Expected 96 ZIP files, but got {total_zip_count}")

          print("\nALL COMPLETE. 96 monthly ZIP files created.", flush=True)
          PY

      - name: Verify 96 ZIP files
        run: |
          COUNT=$(find all_months -type f -name "*.zip" | wc -l)
          echo "ZIP count: $COUNT"

          if [ "$COUNT" -ne 96 ]; then
            echo "ERROR: Expected 96 ZIP files, got $COUNT"
            exit 1
          fi

      - name: Upload final one-click artifact
        uses: actions/upload-artifact@v4
        with:
          name: DOWNLOAD_THIS_XAUUSD_2015_TO_2022_ALL_IN_ONE
          path: all_months/*.zip
          retention-days: 7
          compression-level: 0
