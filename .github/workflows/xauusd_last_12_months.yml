name: Download XAUUSD last 12 months tick data

on:
  workflow_dispatch:

jobs:
  download-month:
    name: XAUUSD ${{ matrix.year }}-${{ matrix.month }}
    runs-on: ubuntu-latest
    timeout-minutes: 360

    strategy:
      fail-fast: false
      max-parallel: 3
      matrix:
        include:
          - year: 2025
            month: 5
          - year: 2025
            month: 6
          - year: 2025
            month: 7
          - year: 2025
            month: 8
          - year: 2025
            month: 9
          - year: 2025
            month: 10
          - year: 2025
            month: 11
          - year: 2025
            month: 12
          - year: 2026
            month: 1
          - year: 2026
            month: 2
          - year: 2026
            month: 3
          - year: 2026
            month: 4

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: Download monthly XAUUSD tick data
        run: |
          python download_xauusd_month.py \
            --symbol XAUUSD \
            --year ${{ matrix.year }} \
            --month ${{ matrix.month }} \
            --output-dir output

      - name: Upload monthly ZIP artifact
        uses: actions/upload-artifact@v4
        with:
          name: XAUUSD_TICK_${{ matrix.year }}_${{ matrix.month }}_DUKASCOPY
          path: output/*.zip
          if-no-files-found: error
          retention-days: 14
